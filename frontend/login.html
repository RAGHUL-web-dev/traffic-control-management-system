<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrafficAI – Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #04081a;
        }

        .glass {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .glow-ring {
            box-shadow: 0 0 60px rgba(99, 102, 241, 0.25), 0 0 120px rgba(99, 102, 241, 0.08);
        }

        .btn-grad {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            transition: all 0.3s;
        }

        .btn-grad:hover {
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.5);
            transform: translateY(-1px);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(99, 102, 241, 0.25);
            color: #e2e8f0;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .input-field::placeholder {
            color: #64748b;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-10px)
            }
        }

        .float-anim {
            animation: float 4s ease-in-out infinite;
        }

        @keyframes pulse-bg {

            0%,
            100% {
                opacity: .4
            }

            50% {
                opacity: .7
            }
        }

        .bg-orb {
            animation: pulse-bg 6s ease-in-out infinite;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Background orbs -->
    <div class="bg-orb absolute w-96 h-96 bg-indigo-600/20 rounded-full blur-3xl -top-20 -left-20"></div>
    <div class="bg-orb absolute w-80 h-80 bg-purple-600/15 rounded-full blur-3xl -bottom-10 -right-10"
        style="animation-delay:3s"></div>
    <div class="bg-orb absolute w-64 h-64 bg-blue-600/10 rounded-full blur-3xl top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"
        style="animation-delay:2s"></div>

    <div class="relative z-10 w-full max-w-md px-6">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div
                class="float-anim inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-gradient-to-br from-indigo-500 to-purple-600 glow-ring mb-4 shadow-2xl">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold text-white tracking-tight">TrafficAI</h1>
            <p class="text-slate-400 text-sm mt-1">Smart Traffic Monitoring System</p>
        </div>

        <!-- Card -->
        <div class="glass rounded-3xl p-8 glow-ring">
            <h2 class="text-lg font-semibold text-white mb-1">Welcome back</h2>
            <p class="text-xs text-slate-400 mb-6">Sign in to access the control panel</p>

            <div id="error-msg"
                class="hidden mb-4 px-4 py-3 rounded-xl bg-red-500/10 border border-red-500/30 text-red-400 text-sm">
            </div>

            <form id="login-form" class="space-y-4" onsubmit="doLogin(event)">
                <div>
                    <label class="block text-xs text-slate-400 font-medium mb-1.5">Username</label>
                    <input id="username" type="text" placeholder="admin" autocomplete="username"
                        class="input-field w-full rounded-xl px-4 py-3 text-sm" required />
                </div>
                <div>
                    <label class="block text-xs text-slate-400 font-medium mb-1.5">Password</label>
                    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"
                        class="input-field w-full rounded-xl px-4 py-3 text-sm" required />
                </div>
                <button type="submit" id="login-btn"
                    class="btn-grad w-full py-3 rounded-xl text-white font-semibold text-sm mt-2 flex items-center justify-center gap-2">
                    <span id="btn-text">Sign In</span>
                    <svg id="btn-spinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
                    </svg>
                </button>
            </form>

            <div class="mt-6 pt-5 border-t border-slate-700/50">
                <p class="text-xs text-slate-500 text-center mb-2">Demo Credentials</p>
                <div class="grid grid-cols-2 gap-2">
                    <div class="bg-slate-800/50 rounded-xl px-3 py-2 text-center">
                        <p class="text-xs text-indigo-400 font-semibold">Admin</p>
                        <p class="text-xs text-slate-400">admin / admin123</p>
                    </div>
                    <div class="bg-slate-800/50 rounded-xl px-3 py-2 text-center">
                        <p class="text-xs text-indigo-400 font-semibold">Viewer</p>
                        <p class="text-xs text-slate-400">viewer / viewer123</p>
                    </div>
                </div>
            </div>
        </div>

        <p class="text-center text-xs text-slate-600 mt-6">© 2024 TrafficAI · Cafeio Solutions</p>
    </div>

    <script src="/js/api.js"></script>
    <script>
        // Redirect if already logged in
        if (localStorage.getItem("traffic_token")) {
            window.location.href = "/dashboard.html";
        }

        async function doLogin(e) {
            e.preventDefault();
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            const errDiv = document.getElementById("error-msg");
            const btnText = document.getElementById("btn-text");
            const spinner = document.getElementById("btn-spinner");

            errDiv.classList.add("hidden");
            btnText.textContent = "Signing in…";
            spinner.classList.remove("hidden");
            document.getElementById("login-btn").disabled = true;

            try {
                const data = await API.login(username, password);
                localStorage.setItem("traffic_token", data.token);
                localStorage.setItem("traffic_user", JSON.stringify({ username: data.username, role: data.role }));
                window.location.href = "/dashboard.html";
            } catch (err) {
                errDiv.textContent = err.message || "Login failed";
                errDiv.classList.remove("hidden");
                btnText.textContent = "Sign In";
                spinner.classList.add("hidden");
                document.getElementById("login-btn").disabled = false;
            }
        }
    </script>
</body>

</html>
